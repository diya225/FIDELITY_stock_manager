services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: stockmanager
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  ml-service:
    build: ./ml-service
    environment:
      API_KEY: dev_ml_api_key_change_in_production
      INDICATOR_CACHE_TTL: 43200
    ports:
      - "8000:8000"

  backend:
    build: ./backend
    depends_on:
      - postgres
      - ml-service
    environment:
      NODE_ENV: development
      PORT: 3001
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/stockmanager
      JWT_ACCESS_SECRET: dev_access_secret_change_this_32_chars_min
      JWT_REFRESH_SECRET: dev_refresh_secret_change_this_32_chars_min
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      ML_SERVICE_URL: http://ml-service:8000
      ML_SERVICE_API_KEY: dev_ml_api_key_change_in_production
      CORS_ORIGINS: http://localhost:3000
    ports:
      - "3001:3001"

volumes:
  postgres_data:
